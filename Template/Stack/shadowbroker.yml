version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: shadowbroker-backend
    ports:
      - "8000:8000"
    environment:
      - AIS_API_KEY=${AIS_API_KEY}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET}
      - LTA_ACCOUNT_KEY=${LTA_ACCOUNT_KEY}
    volumes:
      - /portainer/Files/AppData/Config/shadowbroker:/app/data
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      args:
        # Optional: set this to your backend's external URL if using custom ports
        # e.g. http://192.168.1.50:9096 — leave empty to auto-detect from browser
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: shadowbroker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
